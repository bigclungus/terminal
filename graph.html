<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="https://clung.us/favicon.png">
  <title>Knowledge Graph — BigClungus</title>
  <script src="/gamecube-sounds.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1117;
      font-family: monospace;
    }
    #graph-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #toolbar {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      z-index: 20;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid #2a2a4e;
      border-radius: 5px;
      padding: 6px 10px;
      backdrop-filter: blur(4px);
    }
    .graph-btn {
      background: #161628;
      border: 1px solid #2a2a4e;
      color: #aaa;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 3px;
      font-family: monospace;
      transition: border-color 0.15s, color 0.15s;
    }
    .graph-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    #back-link {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid #2a2a4e;
      border-radius: 5px;
      padding: 5px 10px;
      backdrop-filter: blur(4px);
    }
    #back-link a {
      color: #8b949e;
      text-decoration: none;
      font-size: 11px;
      font-family: monospace;
      transition: color 0.15s;
    }
    #back-link a:hover { color: #58a6ff; }
    #counts {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid #2a2a4e;
      border-radius: 5px;
      padding: 6px 12px;
      backdrop-filter: blur(4px);
      color: #8b949e;
      font-size: 11px;
      font-family: monospace;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #58a6ff;
      font-size: 13px;
      font-family: monospace;
      z-index: 30;
      pointer-events: none;
    }
    #auto-refresh-indicator {
      font-size: 10px;
      font-family: monospace;
      color: #3fb950;
      opacity: 0.7;
      white-space: nowrap;
      padding-left: 4px;
      border-left: 1px solid #2a2a4e;
      margin-left: 2px;
      transition: opacity 0.2s;
    }
    #auto-refresh-indicator.pulse {
      opacity: 1;
      color: #56d364;
    }

    /* Node search overlay */
    #node-search-overlay {
      display: block;
      position: fixed;
      top: 52px;
      right: 12px;
      z-index: 100;
      width: 260px;
      background: rgba(13, 17, 23, 0.96);
      border: 1px solid #6b5ce7;
      border-radius: 6px;
      padding: 8px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 24px rgba(107, 92, 231, 0.25);
      font-family: monospace;
    }
    #node-search-input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #6b5ce7;
      border-radius: 4px;
      color: #e6edf3;
      font-family: monospace;
      font-size: 12px;
      padding: 5px 8px;
      outline: none;
      box-sizing: border-box;
    }
    #node-search-input::placeholder { color: #555; }
    #node-search-input:focus { border-color: #8b7cf8; }
    #node-search-results {
      margin-top: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    .node-search-result {
      padding: 4px 8px;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s, color 0.1s;
    }
    .node-search-result:hover,
    .node-search-result.active {
      background: #1a1a2e;
      color: #e6edf3;
    }
    .node-search-result .ns-group {
      font-size: 9px;
      color: #6b5ce7;
      margin-left: 6px;
      vertical-align: middle;
    }
    #node-search-hint {
      margin-top: 5px;
      font-size: 9px;
      color: #444;
      text-align: right;
    }
    #ingestion-status {
      font-size: 10px;
      font-family: monospace;
      color: #8b949e;
      white-space: nowrap;
      padding-left: 8px;
      border-left: 1px solid #2a2a4e;
      margin-left: 2px;
    }
    /* Leaf panel sidebar */
    #leaf-panel {
      display: none;
      position: fixed;
      right: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: #111318;
      color: #eee;
      overflow-y: auto;
      padding: 16px;
      font-family: monospace;
      border-left: 1px solid #2a2a4e;
      z-index: 1000;
      box-shadow: -4px 0 24px rgba(0,0,0,0.5);
    }
    #leaf-panel-title {
      margin: 0;
      color: #79b8ff;
      font-size: 14px;
    }
    #leaf-panel-close {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    #leaf-panel-close:hover { color: #f85149; }
    #leaf-panel-meta {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }
    #leaf-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 11px;
    }
    #leaf-table thead tr {
      color: #79b8ff;
      text-align: left;
      border-bottom: 1px solid #2a2a4e;
    }
    #leaf-table th {
      padding: 4px 6px;
      font-weight: normal;
    }
    #leaf-table-body tr {
      border-bottom: 1px solid #1a1a2e;
    }
    #leaf-table-body tr:hover {
      background: #1a1a2e;
    }
    #leaf-table-body td {
      padding: 6px 6px;
      vertical-align: top;
    }
    .lt-label { color: #ccc; }
    .lt-rel   { color: #6b5ce7; font-size: 10px; }
    .lt-content { color: #666; font-size: 10px; max-width: 180px; word-break: break-word; }
    .lt-row-highlight {
      background: #1f1a3a !important;
      outline: 1px solid #6b5ce7;
    }

    #legend {
      position: fixed;
      bottom: 14px;
      left: 14px;
      background: rgba(13,17,23,0.85);
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: monospace;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #aaa;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="graph-canvas"></div>
  <div id="toolbar">
    <button class="graph-btn" onclick="refreshGraph()">Refresh</button>
    <button class="graph-btn" onclick="fitGraph()">Fit</button>
    <button class="graph-btn" id="reset-isolation-btn" onclick="resetIsolation(); closeLeafPanel();" style="display:none">reset filter</button>
    <button class="graph-btn" id="orphan-toggle-btn" onclick="toggleOrphans()" style="display:none">show orphans (0)</button>
    <span id="auto-refresh-indicator">auto-refresh: 60s</span>
    <span id="ingestion-status">&#x1F4CA; loading...</span>
  </div>
  <div id="counts">loading...</div>

  <!-- Node search overlay -->
  <div id="node-search-overlay">
    <input id="node-search-input" type="text" placeholder="Search nodes… (Enter to go, Esc to close)" autocomplete="off" spellcheck="false">
    <div id="node-search-results"></div>
    <div id="node-search-hint"></div>
  </div>
  <div id="legend"></div>
  <div id="back-link"><a href="/">&#x2190; terminal</a></div>
  <div id="loading">Loading graph...</div>

  <!-- Leaf node sidebar panel -->
  <div id="leaf-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 id="leaf-panel-title"></h3>
      <button id="leaf-panel-close" onclick="closeLeafPanel()" title="Close">&#x2715;</button>
    </div>
    <div id="leaf-panel-meta"></div>
    <table id="leaf-table">
      <thead>
        <tr>
          <th>attribute</th>
          <th>relationship</th>
        </tr>
      </thead>
      <tbody id="leaf-table-body"></tbody>
    </table>
  </div>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script>
    const GROUP_COLORS = {
      Person:    { background: '#f0883e', border: '#bd561d', highlight: { background: '#ffab70', border: '#f0883e' } },
      Place:     { background: '#bc8cff', border: '#8957e5', highlight: { background: '#d2a8ff', border: '#bc8cff' } },
      Company:   { background: '#58a6ff', border: '#1f6feb', highlight: { background: '#79b8ff', border: '#58a6ff' } },
      Tech:      { background: '#3fb950', border: '#238636', highlight: { background: '#56d364', border: '#3fb950' } },
      Politics:  { background: '#f85149', border: '#cf222e', highlight: { background: '#ffa198', border: '#f85149' } },
      Concept:   { background: '#d29922', border: '#9e6a03', highlight: { background: '#e3b341', border: '#d29922' } },
      Entity:    { background: '#8b949e', border: '#57606a', highlight: { background: '#adbac7', border: '#8b949e' } },
    };

    const DEFAULT_COLOR = { background: '#8b949e', border: '#57606a', highlight: { background: '#adbac7', border: '#8b949e' } };

    // Build legend from GROUP_COLORS (excluding the fallback Entity entry)
    (function () {
      const el = document.getElementById('legend');
      Object.entries(GROUP_COLORS).filter(([g]) => g !== 'Entity').forEach(function ([group, col]) {
        el.innerHTML += '<div class="legend-item"><div class="legend-dot" style="background:' + col.background + '"></div> ' + group + '</div>';
      });
    })();

    let graphNetwork = null;
    let nodesDS = null;
    let edgesDS = null;

    // Node isolation state
    let isolatedNodeId = null;       // currently isolated node, or null
    let savedNodeStates = {};        // original node states before dimming
    let savedEdgeStates = {};        // original edge states before dimming

    // Leaf-node collapse state (populated in processLeafNodes)
    let leafDetails = {};   // personNodeId -> [{label, relationship, content}]
    let leafNodeSet = new Set();

    // Full search index including collapsed leaf nodes.
    // Each entry: { label, group, isLeaf, parentId, parentLabel, relationship, content }
    let leafSearchIndex = [];

    // Orphan node state (degree-0 nodes, hidden by default)
    let orphanNodes = [];       // raw node objects with degree 0
    let showOrphans = false;


    // Person node identifiers — labels containing any of these are treated as "person hubs"
    const PERSON_LABELS = [
      'jaboostin', 'justin',
      'centronias', 'charles', 'kyle', 'dylan',
      'graeme', 'kubariet', 'koole',
      'bigclungus',
    ];

    function isPersonNode(node) {
      if (!node || !node.label) return false;
      const lc = node.label.toLowerCase();
      return PERSON_LABELS.some(p => lc.includes(p));
    }

    /**
     * Given the raw nodes/edges arrays, compute leafDetails and leafNodeSet,
     * then return { visibleNodes, visibleEdges } with leaf nodes stripped out.
     */
    function processLeafNodes(nodes, edges) {
      leafDetails = {};
      leafNodeSet = new Set();

      // Build a node-id lookup
      const nodeById = {};
      nodes.forEach(n => { nodeById[n.id] = n; });

      // Compute degree for every node id
      const degree = {};
      edges.forEach(e => {
        degree[e.from] = (degree[e.from] || 0) + 1;
        degree[e.to]   = (degree[e.to]   || 0) + 1;
      });

      // Identify leaf nodes
      nodes.forEach(n => {
        if ((degree[n.id] || 0) !== 1) return;          // must have exactly one connection
        const edge = edges.find(e => e.from === n.id || e.to === n.id);
        if (!edge) return;
        const otherId = edge.from === n.id ? edge.to : edge.from;
        const other   = nodeById[otherId];
        if (!isPersonNode(other)) return;                // hub must be a person

        leafNodeSet.add(n.id);
        if (!leafDetails[otherId]) leafDetails[otherId] = [];
        leafDetails[otherId].push({
          label:        n.label        || '(unlabeled)',
          relationship: edge.label     || edge.title || '',
          content:      n.title        || '',
        });
      });

      // Sort each person's leaf list alphabetically by label
      Object.values(leafDetails).forEach(arr =>
        arr.sort((a, b) => a.label.localeCompare(b.label))
      );

      // Build the full search index: rendered nodes + collapsed leaf nodes
      leafSearchIndex = [];
      // Rendered (non-leaf) nodes
      nodes.filter(n => !leafNodeSet.has(n.id)).forEach(n => {
        leafSearchIndex.push({
          label: n.label || '',
          group: n.group || '',
          isLeaf: false,
          parentId: null,
          parentLabel: null,
          relationship: null,
          content: n.title || '',
          _nodeId: n.id,
        });
      });
      // Collapsed leaf nodes
      Object.entries(leafDetails).forEach(([parentId, leaves]) => {
        const parentNode = nodeById[parentId];
        const parentLabel = parentNode ? (parentNode.label || parentId) : parentId;
        leaves.forEach(leaf => {
          leafSearchIndex.push({
            label: leaf.label,
            group: '',
            isLeaf: true,
            parentId: parentId,
            parentLabel: parentLabel,
            relationship: leaf.relationship,
            content: leaf.content,
            _nodeId: null,
          });
        });
      });

      const visibleNodes = nodes.filter(n => !leafNodeSet.has(n.id));
      const visibleEdges = edges.filter(e => !leafNodeSet.has(e.from) && !leafNodeSet.has(e.to));
      return { visibleNodes, visibleEdges };
    }

    /**
     * After processLeafNodes, call this to separate degree-0 nodes from visibleNodes.
     * Orphans are hidden by default; use the toggle button to show them.
     * Returns { mainNodes, mainEdges } with orphans removed from mainNodes.
     * Also populates the global `orphanNodes` array and adds orphans to leafSearchIndex.
     */
    function identifyOrphans(visibleNodes, visibleEdges) {
      // Compute degree among visible nodes
      const visibleDegree = {};
      visibleEdges.forEach(e => {
        visibleDegree[e.from] = (visibleDegree[e.from] || 0) + 1;
        visibleDegree[e.to]   = (visibleDegree[e.to]   || 0) + 1;
      });

      orphanNodes = visibleNodes.filter(n => (visibleDegree[n.id] || 0) === 0);
      const orphanSet = new Set(orphanNodes.map(n => n.id));

      // Add orphans to the search index so Ctrl+F can still find them
      orphanNodes.forEach(n => {
        leafSearchIndex.push({
          label: n.label || '',
          group: n.group || '',
          isLeaf: false,
          isOrphan: true,
          parentId: null,
          parentLabel: null,
          relationship: null,
          content: n.title || '',
          _nodeId: n.id,
        });
      });

      const mainNodes = visibleNodes.filter(n => !orphanSet.has(n.id));
      // mainEdges already have no orphan endpoints since orphans have degree 0
      return { mainNodes, mainEdges: visibleEdges };
    }

    /**
     * Compute fixed grid positions for orphan nodes in the bottom-right corner
     * of the visible canvas area.
     */
    function getOrphanPositions() {
      const cols = Math.ceil(Math.sqrt(orphanNodes.length + 1));
      const cellW = 80;
      const cellH = 60;
      // Use a large fixed offset so orphans sit well below the main graph
      const originX = 1200;
      const originY = 1200;
      return orphanNodes.map((n, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        return { id: n.id, x: originX + col * cellW, y: originY + row * cellH };
      });
    }

    /** Add orphan nodes to the live dataset at fixed positions */
    function addOrphansToGraph() {
      const positions = getOrphanPositions();
      const posMap = {};
      positions.forEach(p => { posMap[p.id] = p; });

      const items = orphanNodes.map(n => {
        const pos = posMap[n.id];
        const item = makeNodeItem(n);
        // Slightly dimmed so they're visually distinct from main graph nodes
        item.opacity = 0.55;
        item.x = pos.x;
        item.y = pos.y;
        item.fixed = { x: true, y: true };
        return item;
      });
      nodesDS.update(items);
    }

    /** Remove orphan nodes from the live dataset */
    function removeOrphansFromGraph() {
      nodesDS.remove(orphanNodes.map(n => n.id));
    }

    /** Toggle the orphan display and update button label */
    function toggleOrphans() {
      showOrphans = !showOrphans;
      const btn = document.getElementById('orphan-toggle-btn');
      if (showOrphans) {
        addOrphansToGraph();
        btn.textContent = 'hide orphans (' + orphanNodes.length + ')';
        btn.style.color = '#79b8ff';
        btn.style.borderColor = '#79b8ff';
      } else {
        removeOrphansFromGraph();
        btn.textContent = 'show orphans (' + orphanNodes.length + ')';
        btn.style.color = '';
        btn.style.borderColor = '';
      }
    }

    /** Refresh the orphan toggle button label/state without changing visibility */
    function syncOrphanButton() {
      const btn = document.getElementById('orphan-toggle-btn');
      if (!btn) return;
      if (orphanNodes.length === 0) {
        btn.style.display = 'none';
        return;
      }
      btn.style.display = '';
      if (showOrphans) {
        btn.textContent = 'hide orphans (' + orphanNodes.length + ')';
        btn.style.color = '#79b8ff';
        btn.style.borderColor = '#79b8ff';
      } else {
        btn.textContent = 'show orphans (' + orphanNodes.length + ')';
        btn.style.color = '';
        btn.style.borderColor = '';
      }
    }

    /**
     * Isolate a node: dim everything not directly connected to it.
     */
    function isolateNode(nodeId) {
      // Find all connected node IDs
      const connectedNodeIds = new Set([nodeId]);
      const connectedEdgeIds = new Set();
      edgesDS.get().forEach(function (e) {
        if (e.from === nodeId || e.to === nodeId) {
          connectedNodeIds.add(e.from);
          connectedNodeIds.add(e.to);
          connectedEdgeIds.add(e.id);
        }
      });

      // Save original states and dim non-connected nodes
      savedNodeStates = {};
      savedEdgeStates = {};

      nodesDS.get().forEach(function (n) {
        savedNodeStates[n.id] = {
          color: n.color,
          font: n.font,
          opacity: n.opacity,
          borderWidth: n.borderWidth,
          size: n.size,
        };
        if (!connectedNodeIds.has(n.id)) {
          nodesDS.update({
            id: n.id,
            hidden: true,
          });
        }
      });

      edgesDS.get().forEach(function (e) {
        savedEdgeStates[e.id] = {
          color: e.color,
          font: e.font,
          hidden: e.hidden,
        };
        if (!connectedEdgeIds.has(e.id)) {
          edgesDS.update({
            id: e.id,
            hidden: true,
          });
        }
      });

      isolatedNodeId = nodeId;

      // Show the reset button
      var resetBtn = document.getElementById('reset-isolation-btn');
      var selectedNode = nodesDS.get(nodeId);
      resetBtn.textContent = 'showing: ' + (selectedNode ? selectedNode.label : 'selected');
      resetBtn.style.display = '';
      resetBtn.style.color = '#79b8ff';
      resetBtn.style.borderColor = '#79b8ff';
    }

    /**
     * Reset isolation: restore all nodes and edges to their original state.
     */
    function resetIsolation() {
      if (!isolatedNodeId) return;

      // Restore nodes
      nodesDS.get().forEach(function (n) {
        if (savedNodeStates[n.id]) {
          nodesDS.update({
            id: n.id,
            hidden: false,
          });
        }
      });

      // Restore edges
      edgesDS.get({ filter: function () { return true; } }).forEach(function (e) {
        if (savedEdgeStates[e.id]) {
          edgesDS.update({
            id: e.id,
            hidden: false,
          });
        }
      });

      // Also unhide any edges that were hidden (DataSet might not return hidden items via get())
      Object.keys(savedEdgeStates).forEach(function (eid) {
        var numId = isNaN(Number(eid)) ? eid : Number(eid);
        edgesDS.update({ id: numId, hidden: false });
      });

      // Unhide all nodes too (same reason)
      Object.keys(savedNodeStates).forEach(function (nid) {
        nodesDS.update({ id: nid, hidden: false });
      });

      savedNodeStates = {};
      savedEdgeStates = {};
      isolatedNodeId = null;

      // Hide the reset button
      var resetBtn = document.getElementById('reset-isolation-btn');
      resetBtn.style.display = 'none';
    }

    function closeLeafPanel() {
      document.getElementById('leaf-panel').style.display = 'none';
      document.getElementById('node-search-overlay').style.right = '12px';
      document.getElementById('counts').style.right = '12px';
    }

    /**
     * Open the leaf panel for a given person node.
     * @param {string} nodeId       - the person node's ID
     * @param {string} nodeLabel    - display name for the panel header
     * @param {string} [highlightLabel] - if provided, scroll to and highlight the row with this label
     */
    function openLeafPanel(nodeId, nodeLabel, highlightLabel) {
      const items = leafDetails[nodeId] || [];
      document.getElementById('leaf-panel-title').textContent = nodeLabel || nodeId;
      document.getElementById('leaf-panel-meta').textContent =
        items.length + ' collapsed attribute' + (items.length !== 1 ? 's' : '');

      const tbody = document.getElementById('leaf-table-body');
      tbody.innerHTML = items.map(item => {
        const rel     = item.relationship ? escapeHtmlGlobal(item.relationship) : '<span style="color:#333">—</span>';
        const content = item.content
          ? '<div class="lt-content">' + escapeHtmlGlobal(item.content) + '</div>'
          : '';
        const rowClass = (highlightLabel && item.label === highlightLabel)
          ? ' class="lt-row-highlight"'
          : '';
        const dataAttr = ' data-label="' + escapeHtmlGlobal(item.label) + '"';
        return '<tr' + rowClass + dataAttr + '>' +
          '<td class="lt-label">' + escapeHtmlGlobal(item.label) + content + '</td>' +
          '<td class="lt-rel">'  + rel + '</td>' +
          '</tr>';
      }).join('');

      document.getElementById('leaf-panel').style.display = 'block';
      // Shift search overlay and counts badge left so they don't overlap the panel
      document.getElementById('node-search-overlay').style.right = '332px';
      document.getElementById('counts').style.right = '332px';

      // Scroll highlighted row into view
      if (highlightLabel) {
        const highlightedRow = tbody.querySelector('.lt-row-highlight');
        if (highlightedRow) {
          setTimeout(() => highlightedRow.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
        }
      }
    }

    function escapeHtmlGlobal(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Auto-refresh state
    const AUTO_REFRESH_INTERVAL = 60; // seconds
    let autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
    let autoRefreshTimer = null;
    let countdownTimer = null;

    function makeNodeItem(n) {
      // Person nodes with collapsed leaves get a slightly larger size and bolder border
      const hasLeaves = !!leafDetails[n.id];
      const baseColor = GROUP_COLORS[n.group] || DEFAULT_COLOR;
      const nodeColor = hasLeaves
        ? Object.assign({}, baseColor, { border: '#79b8ff' })
        : baseColor;
      const tooltipSuffix = hasLeaves
        ? '\n\n[' + leafDetails[n.id].length + ' collapsed attributes — click to expand]'
        : '';
      return {
        id: n.id,
        label: n.label,
        title: (n.title || '') + tooltipSuffix,
        group: n.group,
        color: nodeColor,
        font: { color: '#e6edf3', size: 11, face: 'monospace' },
        borderWidth: hasLeaves ? 2 : 1,
        size: hasLeaves ? 22 : 16,
      };
    }

    function makeEdgeItem(e, i) {
      return {
        id: i,
        from: e.from,
        to: e.to,
        label: undefined,          // hidden by default; shown on hover
        _fullLabel: e.label,       // stash the real label for hover display
        title: e.title,
        color: { color: '#444', highlight: '#58a6ff', hover: '#58a6ff' },
        font: { color: '#888', size: 9, face: 'monospace', background: '#0d1117', strokeWidth: 0 },
        arrows: { to: { enabled: true, scaleFactor: 0.5 } },
        smooth: { type: 'dynamic' },
      };
    }

    async function fetchGraphData() {
      const resp = await fetch('/graph-data');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    async function loadGraph() {
      const loadingEl = document.getElementById('loading');
      const countsEl = document.getElementById('counts');
      loadingEl.style.display = 'block';
      countsEl.textContent = 'loading...';
      try {
        const data = await fetchGraphData();
        loadingEl.style.display = 'none';
        const { visibleNodes, visibleEdges } = processLeafNodes(data.nodes, data.edges);
        const { mainNodes, mainEdges } = identifyOrphans(visibleNodes, visibleEdges);
        showOrphans = false;
        syncOrphanButton();
        renderGraph({ nodes: mainNodes, edges: mainEdges });
        const leafCount = data.nodes.length - visibleNodes.length;
        countsEl.textContent =
          mainNodes.length + ' nodes  |  ' + mainEdges.length + ' edges' +
          (leafCount > 0 ? '  |  ' + leafCount + ' collapsed' : '') +
          (orphanNodes.length > 0 ? '  |  ' + orphanNodes.length + ' orphaned' : '');
      } catch (e) {
        loadingEl.textContent = 'Error: ' + e.message;
        countsEl.textContent = 'error';
      }
    }

    function renderGraph(data) {
      const canvasEl = document.getElementById('graph-canvas');

      const visNodes = data.nodes.map(makeNodeItem);
      const visEdges = data.edges.map(makeEdgeItem);

      const options = {
        physics: {
          enabled: true,
          solver: 'barnesHut',
          barnesHut: {
            gravitationalConstant: -2000,
            centralGravity: 0.1,
            springLength: 150,
            springConstant: 0.04,
            damping: 0.6,
            avoidOverlap: 0.1,
          },
          stabilization: { iterations: 300, fit: true },
        },
        interaction: {
          hover: true,
          tooltipDelay: 100,
          navigationButtons: false,
          zoomView: true,
          dragView: true,
        },
        layout: {
          improvedLayout: true,
        },
        nodes: {
          shape: 'dot',
        },
        edges: {
          width: 1,
          selectionWidth: 2,
        },
        background: { color: '#0d1117' },
      };

      nodesDS = new vis.DataSet(visNodes);
      edgesDS = new vis.DataSet(visEdges);

      if (graphNetwork) {
        graphNetwork.destroy();
      }
      graphNetwork = new vis.Network(canvasEl, { nodes: nodesDS, edges: edgesDS }, options);
      graphNetwork.once('stabilizationIterationsDone', () => {
        // Disable physics entirely after layout is computed — positions are now fixed
        graphNetwork.setOptions({ physics: { enabled: false } });
      });

      // Click handler: isolate node neighborhood, open leaf panel for person nodes
      graphNetwork.on('click', function (params) {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];

          // If clicking the already-isolated node, reset isolation
          if (isolatedNodeId === nodeId) {
            resetIsolation();
            closeLeafPanel();
            return;
          }

          // Reset any existing isolation before applying new one
          if (isolatedNodeId) resetIsolation();

          // Isolate the clicked node's neighborhood
          isolateNode(nodeId);

          // Open leaf panel if this is a person node with collapsed leaves
          if (leafDetails[nodeId]) {
            const node = nodesDS.get(nodeId);
            openLeafPanel(nodeId, node ? node.label : nodeId);
          } else {
            closeLeafPanel();
          }
        } else {
          // Clicked background — reset isolation and close panel
          resetIsolation();
          closeLeafPanel();
        }
      });

      // ── Edge labels on hover only ──────────────────────────────────────────
      // Show edge label when hovering over an edge
      let hoveredEdgeId = null;
      graphNetwork.on('hoverEdge', function (params) {
        const eid = params.edge;
        if (hoveredEdgeId === eid) return;
        // Hide previous
        if (hoveredEdgeId !== null) {
          edgesDS.update({ id: hoveredEdgeId, label: undefined });
        }
        hoveredEdgeId = eid;
        const edge = edgesDS.get(eid);
        if (edge && edge._fullLabel) {
          edgesDS.update({ id: eid, label: edge._fullLabel });
        }
      });
      graphNetwork.on('blurEdge', function (params) {
        if (hoveredEdgeId !== null) {
          edgesDS.update({ id: hoveredEdgeId, label: undefined });
          hoveredEdgeId = null;
        }
      });

      // Show edge labels for all edges connected to a hovered node
      let hoveredNodeEdges = [];
      graphNetwork.on('hoverNode', function (params) {
        const nodeId = params.node;
        const connected = graphNetwork.getConnectedEdges(nodeId);
        connected.forEach(function (eid) {
          const edge = edgesDS.get(eid);
          if (edge && edge._fullLabel) {
            edgesDS.update({ id: eid, label: edge._fullLabel });
          }
        });
        hoveredNodeEdges = connected;
      });
      graphNetwork.on('blurNode', function (params) {
        hoveredNodeEdges.forEach(function (eid) {
          // Don't hide if this edge is still hovered directly
          if (eid !== hoveredEdgeId) {
            edgesDS.update({ id: eid, label: undefined });
          }
        });
        hoveredNodeEdges = [];
      });

    }

    async function refreshGraph() {
      // Reset any active isolation before refreshing data
      resetIsolation();
      if (!graphNetwork || !nodesDS || !edgesDS) {
        await loadGraph();
        return;
      }
      const countsEl = document.getElementById('counts');
      try {
        const data = await fetchGraphData();
        const { visibleNodes, visibleEdges } = processLeafNodes(data.nodes, data.edges);
        const { mainNodes, mainEdges } = identifyOrphans(visibleNodes, visibleEdges);

        // Build lookup maps for incoming main (non-orphan) data
        const incomingNodeIds = new Set(mainNodes.map(n => n.id));
        const incomingEdgeIds = new Set(mainEdges.map((_, i) => i));

        // Also account for currently-shown orphan ids so we can re-add them if needed
        const orphanIds = new Set(orphanNodes.map(n => n.id));

        // Remove nodes/edges no longer present (exclude currently-shown orphans from removal)
        const removedNodeIds = nodesDS.getIds().filter(id => !incomingNodeIds.has(id) && !orphanIds.has(id));
        const removedEdgeIds = edgesDS.getIds().filter(id => !incomingEdgeIds.has(id));
        if (removedNodeIds.length) nodesDS.remove(removedNodeIds);
        if (removedEdgeIds.length) edgesDS.remove(removedEdgeIds);

        // Update or add main nodes
        const nodeUpdates = mainNodes.map(makeNodeItem);
        nodesDS.update(nodeUpdates);

        // Update or add edges
        const edgeUpdates = mainEdges.map(makeEdgeItem);
        edgesDS.update(edgeUpdates);

        // If orphans were showing, refresh them in place; if not, strip any stale orphan nodes
        if (showOrphans) {
          addOrphansToGraph();
        } else {
          nodesDS.remove(orphanNodes.map(n => n.id));
        }
        syncOrphanButton();

        const leafCount = data.nodes.length - visibleNodes.length;
        countsEl.textContent =
          mainNodes.length + ' nodes  |  ' + mainEdges.length + ' edges' +
          (leafCount > 0 ? '  |  ' + leafCount + ' collapsed' : '') +
          (orphanNodes.length > 0 ? '  |  ' + orphanNodes.length + ' orphaned' : '');
        pulseIndicator();
      } catch (e) {
        countsEl.textContent = 'refresh error';
      }
    }

    function fitGraph() {
      if (graphNetwork) graphNetwork.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
    }

    // Auto-refresh indicator + countdown

    function pulseIndicator() {
      const el = document.getElementById('auto-refresh-indicator');
      el.classList.add('pulse');
      setTimeout(() => el.classList.remove('pulse'), 600);
    }

    function updateIndicator() {
      const el = document.getElementById('auto-refresh-indicator');
      el.textContent = 'auto-refresh: ' + autoRefreshCountdown + 's';
    }

    function startAutoRefresh() {
      autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
      updateIndicator();

      // Tick every second for the countdown display
      countdownTimer = setInterval(() => {
        autoRefreshCountdown -= 1;
        if (autoRefreshCountdown < 0) autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
        updateIndicator();
      }, 1000);

      // Actual refresh every 60 seconds
      autoRefreshTimer = setInterval(async () => {
        autoRefreshCountdown = AUTO_REFRESH_INTERVAL;
        updateIndicator();
        await refreshGraph();
      }, AUTO_REFRESH_INTERVAL * 1000);
    }

    // Ingestion status
    async function refreshIngestionStatus() {
      const el = document.getElementById('ingestion-status');
      try {
        const resp = await fetch('/ingestion-status');
        if (!resp.ok) { el.textContent = '&#x1F4CA; unavailable'; return; }
        const d = await resp.json();
        let text = '\uD83D\uDCCA Graph: ' + d.episodes + '/' + d.total_episodes + ' episodes \u00B7 ' + d.entities + ' entities \u00B7 ' + d.edges + ' edges';
        if (d.workers_running > 0) text += ' \u00B7 \u23F3 ingesting...';
        el.textContent = text;
      } catch (e) {
        el.textContent = '\uD83D\uDCCA unavailable';
      }
    }

    refreshIngestionStatus();
    setInterval(refreshIngestionStatus, 10000);

    loadGraph().then(startAutoRefresh);

    // GameCube OS sounds — attach to toolbar buttons
    document.querySelectorAll('.graph-btn').forEach(function (btn) {
      btn.addEventListener('mouseenter', function () { if (window.GCSounds) GCSounds.hover(); });
      btn.addEventListener('click', function () { if (window.GCSounds) GCSounds.click(); }, true);
    });

    // ── Node Search (Ctrl+F / Cmd+F) ─────────────────────────────────────────
    // Searches ALL nodes including leaf nodes collapsed into the sidebar panel.

    (function () {
      const overlay  = document.getElementById('node-search-overlay');
      const input    = document.getElementById('node-search-input');
      const results  = document.getElementById('node-search-results');
      let activeIdx  = -1;
      // matchCache entries: { label, group, isLeaf, parentId, parentLabel, _nodeId }
      let matchCache = [];

      function clearSearch() {
        input.value = '';
        results.innerHTML = '';
        matchCache = [];
        activeIdx = -1;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function buildResults(query) {
        results.innerHTML = '';
        activeIdx = -1;
        if (!query) { matchCache = []; return; }

        const q = query.toLowerCase();

        // Search leafSearchIndex (includes rendered nodes + collapsed leaf nodes).
        // Fall back to nodesDS if leafSearchIndex not yet populated (e.g. graph still loading).
        let candidates;
        if (leafSearchIndex && leafSearchIndex.length > 0) {
          candidates = leafSearchIndex.filter(entry =>
            entry.label && entry.label.toLowerCase().includes(q)
          );
        } else if (nodesDS) {
          candidates = nodesDS.get()
            .filter(n => n.label && n.label.toLowerCase().includes(q))
            .map(n => ({ label: n.label, group: n.group || '', isLeaf: false, _nodeId: n.id, parentId: null, parentLabel: null }));
        } else {
          candidates = [];
        }

        matchCache = candidates.slice(0, 12);

        matchCache.forEach(function (entry, i) {
          const div = document.createElement('div');
          div.className = 'node-search-result';
          div.dataset.idx = i;
          const groupLabel = entry.group || '';
          const dotColor = (GROUP_COLORS[groupLabel] || DEFAULT_COLOR).background;

          if (entry.isLeaf) {
            // Leaf node: show label + "in [ParentName]" annotation
            div.innerHTML =
              escapeHtml(entry.label) +
              '<span class="ns-group" style="color:#79b8ff"> in ' + escapeHtml(entry.parentLabel || '?') + '</span>';
          } else if (entry.isOrphan) {
            // Orphan node: show label + dim "orphan" tag
            div.innerHTML =
              escapeHtml(entry.label) +
              (groupLabel ? '<span class="ns-group" style="color:' + dotColor + '">&#9679; ' + escapeHtml(groupLabel) + '</span>' : '') +
              '<span class="ns-group" style="color:#555"> orphan</span>';
          } else {
            div.innerHTML =
              escapeHtml(entry.label) +
              (groupLabel ? '<span class="ns-group" style="color:' + dotColor + '">&#9679; ' + escapeHtml(groupLabel) + '</span>' : '');
          }

          div.addEventListener('mouseenter', function () { setActive(i); });
          div.addEventListener('click', function () { selectResult(i); });
          results.appendChild(div);
        });
      }

      function setActive(idx) {
        const items = results.querySelectorAll('.node-search-result');
        items.forEach(function (el, i) {
          el.classList.toggle('active', i === idx);
        });
        activeIdx = idx;
      }

      let flashTimer = null;

      function focusAndFlashNode(nodeId) {
        if (!graphNetwork || !nodesDS) return;
        graphNetwork.selectNodes([nodeId]);
        graphNetwork.focus(nodeId, {
          scale: 1.5,
          animation: { duration: 500, easingFunction: 'easeInOutQuad' },
        });
        const orig = nodesDS.get(nodeId);
        if (!orig) return;
        nodesDS.update({ id: nodeId, borderWidth: 4, color: Object.assign({}, orig.color, { border: '#6b5ce7' }) });
        clearTimeout(flashTimer);
        flashTimer = setTimeout(function () {
          nodesDS.update({ id: nodeId, borderWidth: orig.borderWidth || 1, color: orig.color });
        }, 800);
      }

      function selectResult(idx) {
        if (!matchCache[idx]) return;
        const entry = matchCache[idx];
        clearSearch();

        if (entry.isLeaf) {
          // Leaf node: navigate to the parent person node, open panel, highlight the row
          if (!graphNetwork) return;
          const parentId = entry.parentId;
          const parentNode = nodesDS ? nodesDS.get(parentId) : null;
          focusAndFlashNode(parentId);
          openLeafPanel(parentId, parentNode ? parentNode.label : (entry.parentLabel || parentId), entry.label);
        } else if (entry.isOrphan) {
          // Orphan node: ensure orphans are visible first, then navigate
          if (!showOrphans) toggleOrphans();
          focusAndFlashNode(entry._nodeId);
        } else {
          // Rendered node: navigate directly
          focusAndFlashNode(entry._nodeId);
        }
      }

      // Keyboard shortcuts
      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
          e.preventDefault();
          input.focus();
          input.select();
          return;
        }

        if (e.key === 'Escape') {
          e.preventDefault();
          clearSearch();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          setActive(Math.min(activeIdx + 1, matchCache.length - 1));
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          setActive(Math.max(activeIdx - 1, 0));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const idx = activeIdx >= 0 ? activeIdx : 0;
          selectResult(idx);
        }
      });

      // Live search as user types
      input.addEventListener('input', function () {
        buildResults(input.value.trim());
        if (matchCache.length > 0) setActive(0);
      });
    })();
  </script>
</body>
</html>
